<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books & Thoughts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f5;
      --surface: #ffffff;
      --surface-2: #f9f9fa;
      --border: #e4e4e7;
      --text: #18181b;
      --text-2: #71717a;
      --text-3: #a1a1aa;
      --accent: #18181b;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0; z-index: 100;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .nav-links {
      display: flex;
      gap: 2px;
      list-style: none;
    }

    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .nav-links a:hover { color: var(--text); background: var(--bg); }

    /* ── HERO ── */
    .hero {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 40px 24px 32px;
    }

    .hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .hero h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.15;
      margin-bottom: 6px;
    }

    .hero-desc {
      font-size: 14px;
      color: var(--text-2);
    }

    .stats {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }

    .stat {
      padding: 12px 20px;
      border-right: 1px solid var(--border);
      text-align: center;
    }

    .stat:last-child { border-right: none; }

    .stat-num {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 500;
      margin-top: 2px;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ── SECTION ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      margin-top: 32px;
    }

    .section-header:first-child { margin-top: 0; }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-3);
    }

    .section-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 7px;
      border-radius: 100px;
    }

    .divider {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── READING GRID ── */
    .reading-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 10px;
    }

    .reading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      gap: 14px;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .reading-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border-color: #d4d4d8;
    }

    .r-cover {
      flex-shrink: 0;
      width: 60px; height: 84px;
      border-radius: 5px;
      overflow: hidden;
      background: var(--bg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .r-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .r-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }

    .r-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      color: #3b82f6;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      padding: 2px 7px;
      border-radius: 100px;
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }

    .r-badge::before {
      content: '';
      width: 5px; height: 5px;
      background: #3b82f6;
      border-radius: 50%;
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .r-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.2px;
      margin-bottom: 2px;
    }

    .r-author {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 12px;
    }

    .progress-wrap { display: flex; align-items: center; gap: 8px; }

    .progress-track {
      flex: 1;
      height: 3px;
      background: var(--bg);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #18181b;
      border-radius: 100px;
    }

    .progress-pct { font-size: 11px; font-weight: 600; color: var(--text-3); white-space: nowrap; }

    /* ── DONE GRID ── */
    .done-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .done-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .done-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border-color: #d4d4d8;
    }

    .d-cover {
      flex-shrink: 0;
      width: 44px; height: 60px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .d-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .d-body { flex: 1; min-width: 0; }

    .d-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.2px;
      margin-bottom: 3px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .d-author { font-size: 11px; color: var(--text-2); margin-bottom: 8px; }

    .d-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .tag {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-3);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .d-date { font-size: 11px; color: var(--text-3); }

    .d-notes {
      font-size: 11px;
      color: var(--text-2);
      text-decoration: none;
      font-weight: 500;
    }

    .d-notes:hover { color: var(--text); }

    /* ── TODO GRID ── */
    .todo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .todo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: box-shadow 0.15s;
    }

    .todo-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); border-color: #d4d4d8; }

    .t-cover {
      flex-shrink: 0;
      width: 36px; height: 50px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg);
    }

    .t-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .t-title { font-size: 12px; font-weight: 600; line-height: 1.4; color: var(--text); }
    .t-author { font-size: 11px; color: var(--text-3); margin-top: 3px; }

    /* ── COVER PLACEHOLDER ── */
    .cover-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700;
      color: rgba(255,255,255,0.75);
      text-align: center; padding: 4px; line-height: 1.3;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    .share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .share-btn:hover { background: var(--border); }
    .share-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 576px) {
      nav { padding: 0 16px; }
      .hero { padding: 28px 16px 24px; }
      .main { padding: 16px; }
      .reading-grid, .done-grid { grid-template-columns: 1fr; }
      .todo-grid { grid-template-columns: repeat(2, 1fr); }
      .hero-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">📚 Books &amp; Thoughts</div>
  <ul class="nav-links">
    <li><a href="#reading">在读</a></li>
    <li><a href="#done">已读</a></li>
    <li><a href="#list">书单</a></li>
  </ul>
  <button class="share-btn" id="share-btn" onclick="generateShareImage()">🖼 生成分享图</button>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div>
      <h1>Books &amp; Thoughts</h1>
      <div class="hero-desc">和 Claude 一起读书，记录思考与对话</div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</div>

<div class="main">

  <div class="section-header" id="reading">
    <span class="section-title">正在读</span>
    <span class="section-count" id="count-reading"></span>
    <div class="divider"></div>
  </div>
  <div class="reading-grid" id="books-reading"></div>

  <div class="section-header" id="done">
    <span class="section-title">已读完</span>
    <span class="section-count" id="count-done"></span>
    <div class="divider"></div>
  </div>
  <div class="done-grid" id="books-done"></div>

  <div class="section-header" id="list">
    <span class="section-title">书单</span>
    <span class="section-count" id="count-todo"></span>
    <div class="divider"></div>
  </div>
  <div class="todo-grid" id="books-todo"></div>

</div>

<footer>用心读书 · 用文字留存思考 · <span id="yr"></span></footer>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  const COLORS = ['#4f46e5','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777','#374151'];
  function colorFor(t) {
    let h = 0;
    for (let c of t) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function coverUrl(isbn) {
    return isbn ? `https://books.google.com/books/content?vid=ISBN${isbn}&printsec=frontcover&img=1&zoom=1` : null;
  }

  function makeCover(book) {
    const url = coverUrl(book.isbn);
    const bg = colorFor(book.title);
    if (!url) return `<div class="cover-ph" style="background:${bg}">${book.title}</div>`;
    return `<img src="${url}" alt="${book.title}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'cover-ph\\' style=\\'background:${bg}\\'>${book.title}</div>'">`;
  }

  const catMap = { tech:'技术', business:'商业', psychology:'心理', science:'科学', 'self-improvement':'成长', philosophy:'哲学', history:'历史', fiction:'文学' };

  const books = {
    reading: [
      { title: '思考，快与慢', author: '丹尼尔·卡尼曼', category: 'psychology', isbn: '9780374533557', progress: 22 },
      { title: '麦肯锡结构化战略思维', author: '周国元', category: 'business', isbn: null, progress: 0 },
    ],
    done: [
      { title: '改变心理学的40项研究', author: '罗杰·R·霍克', category: 'psychology', isbn: '9780205416127', finishedAt: '2026-03' },
      { title: "Don't Make Me Think", author: 'Steve Krug', category: 'tech', isbn: '9780321965516', finishedAt: '2026-03-16', notes: 'tech/dont-make-me-think/notes.md' },
      { title: '为什么', author: '朱迪亚·珀尔', category: 'science', isbn: '9780465097609', finishedAt: '2026-03-14', notes: 'science/the-book-of-why/notes.md' },
      { title: '真体验', author: '', category: 'psychology', isbn: null, finishedAt: '2026-02' },
      { title: '你变了，世界就变了', author: '卡耐基', category: 'self-improvement', isbn: '9787511337306', finishedAt: '2026-02' },
      { title: '洛克菲勒留给儿子的38封信', author: '约翰·D·洛克菲勒', category: 'self-improvement', isbn: null, finishedAt: '2026-02' },
      { title: '用户体验定律', author: '乔恩·亚布隆斯基', category: 'tech', isbn: '9781492055310', finishedAt: '2026-02' },
      { title: '这才是心理学（第11版）', author: '基思·斯坦诺维奇', category: 'psychology', isbn: '9780205914128', finishedAt: '2026-02' },
      { title: '老人与海', author: '海明威', category: 'fiction', isbn: '9780684801223', finishedAt: '2026-01' },
      { title: '学会提问，驾驭AI', author: '程希冀', category: 'tech', isbn: null, finishedAt: '2026-01' },
      { title: '通用人工智能', author: '刘嘉', category: 'tech', isbn: null, finishedAt: '2026-01' },
      { title: '小王子（全彩英文版）', author: '圣埃克苏佩里', category: 'fiction', isbn: '9780547978048', finishedAt: '2026-01' },
    ],
    todo: [
      { title: '认知觉醒', author: '周岭', category: 'self-improvement', isbn: null },
      { title: '时间盒', author: '马克·曹-桑德斯', category: 'self-improvement', isbn: null },
      { title: '置身事内', author: '兰小欢', category: 'business', isbn: null },
      { title: '最重要的事，只有一件', author: '凯勒 & 帕帕森', category: 'self-improvement', isbn: '9787213063671' },
    ],
  };

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${books.reading.length}</div><div class="stat-label">在读</div></div>
    <div class="stat"><div class="stat-num">${books.done.length}</div><div class="stat-label">已读</div></div>
    <div class="stat"><div class="stat-num">${books.todo.length}</div><div class="stat-label">待读</div></div>
  `;

  document.getElementById('count-reading').textContent = books.reading.length;
  document.getElementById('count-done').textContent = books.done.length;
  document.getElementById('count-todo').textContent = books.todo.length;

  document.getElementById('books-reading').innerHTML = books.reading.map(b => `
    <div class="reading-card">
      <div class="r-cover">${makeCover(b)}</div>
      <div class="r-body">
        <div>
          <div class="r-badge">正在读</div>
          <div class="r-title">${b.title}</div>
          <div class="r-author">${b.author}</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-track"><div class="progress-fill" style="width:${b.progress}%"></div></div>
          <span class="progress-pct">${b.progress > 0 ? b.progress + '%' : '未开始'}</span>
        </div>
      </div>
    </div>
  `).join('');

  books.done.sort((a, b) => b.finishedAt.localeCompare(a.finishedAt));

  document.getElementById('books-done').innerHTML = books.done.map(b => `
    <div class="done-card">
      <div class="d-cover">${makeCover(b)}</div>
      <div class="d-body">
        <div class="d-title">${b.title}</div>
        <div class="d-author">${b.author || '—'}</div>
        <div class="d-footer">
          <span class="tag">${catMap[b.category] || b.category}</span>
          <span class="d-date">${b.finishedAt}</span>
          ${b.notes ? `<a class="d-notes" href="${b.notes}">笔记</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('books-todo').innerHTML = books.todo.map(b => `
    <div class="todo-card">
      <div class="t-cover">${makeCover(b)}</div>
      <div>
        <div class="t-title">${b.title}</div>
        <div class="t-author">${b.author}</div>
      </div>
    </div>
  `).join('');

  async function generateShareImage() {
    const btn = document.getElementById('share-btn');
    btn.disabled = true;
    btn.textContent = '⏳ 生成中…';

    const allBooks = [
      ...books.reading.map(b => ({ ...b, status: 'reading' })),
      ...books.done.map(b => ({ ...b, status: 'done' })),
    ];

    const COLS = 4;
    const CARD_W = 160, CARD_H = 220;
    const COVER_W = 100, COVER_H = 140;
    const PAD = 24, GAP = 16;
    const HEADER_H = 100;

    const rows = Math.ceil(allBooks.length / COLS);
    const W = PAD * 2 + COLS * CARD_W + (COLS - 1) * GAP;
    const H = HEADER_H + PAD + rows * CARD_H + (rows - 1) * GAP + PAD;

    const canvas = document.createElement('canvas');
    canvas.width = W * 2; canvas.height = H * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);

    // bg
    ctx.fillStyle = '#f4f4f5';
    ctx.fillRect(0, 0, W, H);

    // header
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, HEADER_H);
    ctx.strokeStyle = '#e4e4e7';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, HEADER_H); ctx.lineTo(W, HEADER_H); ctx.stroke();

    ctx.fillStyle = '#18181b';
    ctx.font = 'bold 22px Inter, sans-serif';
    ctx.fillText('📚 Books & Thoughts', PAD, 36);

    ctx.fillStyle = '#71717a';
    ctx.font = '13px Inter, sans-serif';
    ctx.fillText(`已读 ${books.done.length} 本 · 在读 ${books.reading.length} 本`, PAD, 58);

    ctx.fillStyle = '#a1a1aa';
    ctx.font = '11px Inter, sans-serif';
    ctx.fillText('allinai.asia/books', PAD, 80);

    // load cover images
    async function loadImg(url) {
      return new Promise(res => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => res(img);
        img.onerror = () => res(null);
        img.src = url;
      });
    }

    const BOOK_COLORS = ['#4f46e5','#7c3aed','#0891b2','#059669','#d97706','#dc2626','#db2777','#374151'];
    function colorFor(t) {
      let h = 0;
      for (let c of t) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
      return BOOK_COLORS[Math.abs(h) % BOOK_COLORS.length];
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    for (let i = 0; i < allBooks.length; i++) {
      const book = allBooks[i];
      const col = i % COLS;
      const row = Math.floor(i / COLS);
      const x = PAD + col * (CARD_W + GAP);
      const y = HEADER_H + PAD + row * (CARD_H + GAP);

      // card bg
      ctx.fillStyle = '#ffffff';
      roundRect(ctx, x, y, CARD_W, CARD_H, 8);
      ctx.fill();
      ctx.strokeStyle = '#e4e4e7';
      ctx.lineWidth = 1;
      roundRect(ctx, x, y, CARD_W, CARD_H, 8);
      ctx.stroke();

      // cover
      const coverX = x + (CARD_W - COVER_W) / 2;
      const coverY = y + 12;
      let drawn = false;

      if (book.isbn) {
        const url = `https://books.google.com/books/content?vid=ISBN${book.isbn}&printsec=frontcover&img=1&zoom=1`;
        const img = await loadImg(url);
        if (img && img.naturalWidth > 10) {
          ctx.save();
          roundRect(ctx, coverX, coverY, COVER_W, COVER_H, 4);
          ctx.clip();
          ctx.drawImage(img, coverX, coverY, COVER_W, COVER_H);
          ctx.restore();
          drawn = true;
        }
      }

      if (!drawn) {
        ctx.fillStyle = colorFor(book.title);
        roundRect(ctx, coverX, coverY, COVER_W, COVER_H, 4);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = 'bold 11px Inter, sans-serif';
        ctx.textAlign = 'center';
        const words = book.title.split('');
        let line = '', lines = [];
        for (let ch of words) {
          if (ctx.measureText(line + ch).width > COVER_W - 10) { lines.push(line); line = ch; }
          else line += ch;
        }
        lines.push(line);
        lines.slice(0, 5).forEach((l, li) => {
          ctx.fillText(l, coverX + COVER_W / 2, coverY + COVER_H / 2 - (lines.length - 1) * 7 + li * 14);
        });
        ctx.textAlign = 'left';
      }

      // status badge
      if (book.status === 'reading') {
        ctx.fillStyle = '#eff6ff';
        roundRect(ctx, x + 6, y + COVER_H + 18, CARD_W - 12, 16, 8);
        ctx.fill();
        ctx.fillStyle = '#3b82f6';
        ctx.font = 'bold 9px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('● 正在读', x + CARD_W / 2, y + COVER_H + 29);
      } else {
        ctx.fillStyle = '#f4f4f5';
        roundRect(ctx, x + 6, y + COVER_H + 18, CARD_W - 12, 16, 8);
        ctx.fill();
        ctx.fillStyle = '#a1a1aa';
        ctx.font = 'bold 9px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('✓ ' + book.finishedAt, x + CARD_W / 2, y + COVER_H + 29);
      }

      // title
      ctx.fillStyle = '#18181b';
      ctx.font = 'bold 11px Inter, sans-serif';
      ctx.textAlign = 'center';
      const titleMaxW = CARD_W - 12;
      let title = book.title;
      while (ctx.measureText(title).width > titleMaxW && title.length > 0) title = title.slice(0, -1);
      if (title !== book.title) title += '…';
      ctx.fillText(title, x + CARD_W / 2, y + COVER_H + 48);

      ctx.textAlign = 'left';
    }

    // download
    const link = document.createElement('a');
    link.download = 'books-and-thoughts.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

    btn.disabled = false;
    btn.innerHTML = '🖼 生成分享图';
  }
</script>
