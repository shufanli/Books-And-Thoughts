<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books & Thoughts</title>
  <style>
    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e4dd;
      --text: #1c1c1e;
      --text-secondary: #6e6e73;
      --text-muted: #aeaeb2;
      --accent: #2c5f2e;
      --accent-light: #edf5ee;
      --reading-color: #1d4ed8;
      --reading-bg: #eff6ff;
      --done-color: #166534;
      --done-bg: #f0fdf4;
      --tag-bg: #f2f0ec;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.06);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250,249,247,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--text); }

    /* ── HERO ── */
    .hero {
      max-width: 900px;
      margin: 0 auto;
      padding: 72px 24px 48px;
      text-align: center;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--accent);
      background: var(--accent-light);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 16px;
    }

    .hero h1 span {
      color: var(--accent);
    }

    .hero p {
      font-size: 17px;
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto 40px;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      max-width: 480px;
      margin: 0 auto;
    }

    .stat {
      flex: 1;
      padding: 20px 24px;
      border-right: 1px solid var(--border);
      text-align: center;
    }

    .stat:last-child { border-right: none; }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 52px 0 24px;
    }

    .section-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .icon-reading { background: var(--reading-bg); }
    .icon-done { background: var(--done-bg); }
    .icon-todo { background: #fef9c3; }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .section-count {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      margin-left: auto;
    }

    /* ── CURRENTLY READING (featured) ── */
    .reading-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }

    .reading-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 20px;
      display: flex;
      gap: 18px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .reading-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--reading-color), #60a5fa);
    }

    .reading-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .reading-cover {
      flex-shrink: 0;
      width: 72px;
      height: 100px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--tag-bg);
      box-shadow: 2px 2px 8px rgba(0,0,0,0.12);
    }

    .reading-cover img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .reading-info { flex: 1; min-width: 0; }

    .reading-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--reading-color);
      background: var(--reading-bg);
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .reading-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .reading-author {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    .progress-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar-bg {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--reading-color), #60a5fa);
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .progress-text {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── DONE LIST ── */
    .done-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .done-card {
      background: var(--surface);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: background 0.15s;
      cursor: default;
    }

    .done-card:hover { background: #fdfcfb; }

    .done-cover {
      flex-shrink: 0;
      width: 44px;
      height: 60px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--tag-bg);
      box-shadow: 1px 1px 4px rgba(0,0,0,0.1);
    }

    .done-cover img { width: 100%; height: 100%; object-fit: cover; }

    .done-info { flex: 1; min-width: 0; }

    .done-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .done-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .done-author {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .done-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .done-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--done-bg);
      border: 1.5px solid #86efac;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .done-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .done-notes-link {
      font-size: 12px;
      color: var(--reading-color);
      text-decoration: none;
      font-weight: 500;
    }

    .done-notes-link:hover { text-decoration: underline; }

    /* ── TODO GRID ── */
    .todo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .todo-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.15s, transform 0.15s;
    }

    .todo-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .todo-cover {
      flex-shrink: 0;
      width: 40px;
      height: 56px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--tag-bg);
    }

    .todo-cover img { width: 100%; height: 100%; object-fit: cover; }

    .todo-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
    }

    .todo-author {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ── TAGS ── */
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--tag-bg);
      color: var(--text-secondary);
    }

    /* ── COVER PLACEHOLDER ── */
    .cover-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      padding: 4px;
      line-height: 1.3;
      word-break: break-all;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 48px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .hero { padding: 48px 20px 32px; }
      .container { padding: 0 20px 60px; }
      .reading-grid { grid-template-columns: 1fr; }
      .todo-grid { grid-template-columns: repeat(2, 1fr); }
      footer { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">📚 Books &amp; Thoughts</div>
  <ul class="nav-links">
    <li><a href="#reading">在读</a></li>
    <li><a href="#done">已读</a></li>
    <li><a href="#todo">书单</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Reading Journal</div>
  <h1>书籍与<span>思考</span></h1>
  <p>和 Claude 一起读书，记录每一本书带来的思考与对话</p>
  <div class="stats-row" id="stats-row"></div>
</div>

<div class="container">

  <!-- 在读中 -->
  <div class="section-header" id="reading">
    <div class="section-icon icon-reading">📖</div>
    <h2 class="section-title">正在读</h2>
    <span class="section-count" id="count-reading"></span>
  </div>
  <div class="reading-grid" id="books-reading"></div>

  <!-- 已读完 -->
  <div class="section-header" id="done">
    <div class="section-icon icon-done">✅</div>
    <h2 class="section-title">已读完</h2>
    <span class="section-count" id="count-done"></span>
  </div>
  <div class="done-list" id="books-done"></div>

  <!-- 待读书单 -->
  <div class="section-header" id="todo">
    <div class="section-icon icon-todo">🔖</div>
    <h2 class="section-title">书单</h2>
    <span class="section-count" id="count-todo"></span>
  </div>
  <div class="todo-grid" id="books-todo"></div>

</div>

<footer>
  用心读书 · 用文字留存思考 · <span id="year"></span>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const COLORS = ['#4f7cac','#c17767','#7c9e6e','#9b7cb6','#c49a3c','#6aabb8','#b06a8a','#7a8fa6'];

  function colorFor(title) {
    let h = 0;
    for (let c of title) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function coverUrl(isbn) {
    return isbn ? `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg` : null;
  }

  function makeCoverImg(book, w, h) {
    const url = coverUrl(book.isbn);
    const bg = colorFor(book.title);
    if (!url) {
      return `<div class="cover-placeholder" style="background:${bg}">${book.title}</div>`;
    }
    return `<img src="${url}" alt="${book.title}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'cover-placeholder\\' style=\\'background:${bg}\\'>${book.title}</div>'">`;
  }

  const categoryLabel = c => ({
    tech:'技术', business:'商业', psychology:'心理', science:'科学',
    'self-improvement':'自我提升', philosophy:'哲学', history:'历史', fiction:'小说'
  }[c] || c);

  const books = {
    reading: [
      { title: '思考，快与慢', author: '丹尼尔·卡尼曼', category: 'psychology', isbn: '9780374533557', progress: 22 },
      { title: '麦肯锡结构化战略思维', author: '周国元', category: 'business', isbn: null, progress: 0 },
    ],
    done: [
      { title: '改变心理学的40项研究', author: '罗杰·R·霍克', category: 'psychology', isbn: '9787115472342', finishedAt: '2026-03' },
      { title: '真体验', author: '', category: 'psychology', isbn: '9787572299544', finishedAt: '2026-02' },
      { title: '你变了，世界就变了', author: '卡耐基', category: 'self-improvement', isbn: '9787511337306', finishedAt: '2026-02' },
      { title: '洛克菲勒留给儿子的38封信', author: '约翰·D·洛克菲勒', category: 'self-improvement', isbn: '9787515802091', finishedAt: '2026-02' },
      { title: '用户体验定律', author: '乔恩·亚布隆斯基', category: 'tech', isbn: '9787115614889', finishedAt: '2026-02' },
      { title: '这才是心理学（第11版）', author: '基思·斯坦诺维奇', category: 'psychology', isbn: '9787115464538', finishedAt: '2026-02' },
      { title: '老人与海', author: '海明威', category: 'fiction', isbn: '9787532747986', finishedAt: '2026-01' },
      { title: '学会提问，驾驭AI：提示词从入门到精通', author: '程希冀', category: 'tech', isbn: '9787121477256', finishedAt: '2026-01' },
      { title: '通用人工智能', author: '刘嘉', category: 'tech', isbn: '9787521777505', finishedAt: '2026-01' },
      { title: '小王子（全彩英文版）', author: '圣埃克苏佩里', category: 'fiction', isbn: '9787020042494', finishedAt: '2026-01' },
      { title: "Don't Make Me Think", author: 'Steve Krug', category: 'tech', isbn: '9780321965516', finishedAt: '2026-03-16', notes: 'tech/dont-make-me-think/notes.md' },
      { title: '为什么', author: '朱迪亚·珀尔', category: 'science', isbn: '9780465097609', finishedAt: '2026-03-14', notes: 'science/the-book-of-why/notes.md' },
    ],
    todo: [
      { title: '认知觉醒', author: '周岭', category: 'self-improvement', isbn: null },
      { title: '时间盒', author: '马克·曹-桑德斯', category: 'self-improvement', isbn: null },
      { title: '置身事内', author: '兰小欢', category: 'business', isbn: null },
      { title: '最重要的事，只有一件', author: '凯勒 & 帕帕森', category: 'self-improvement', isbn: '9787213063671' },
    ],
  };

  /* stats */
  const total = books.done.length + books.reading.length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-num">${books.reading.length}</div><div class="stat-label">正在读</div></div>
    <div class="stat"><div class="stat-num">${books.done.length}</div><div class="stat-label">已读完</div></div>
    <div class="stat"><div class="stat-num">${books.todo.length}</div><div class="stat-label">书单待读</div></div>
  `;

  /* section counts */
  document.getElementById('count-reading').textContent = `${books.reading.length} 本`;
  document.getElementById('count-done').textContent = `${books.done.length} 本`;
  document.getElementById('count-todo').textContent = `${books.todo.length} 本`;

  /* reading cards */
  document.getElementById('books-reading').innerHTML = books.reading.map(b => `
    <div class="reading-card">
      <div class="reading-cover">${makeCoverImg(b, 72, 100)}</div>
      <div class="reading-info">
        <div class="reading-badge">● 正在读</div>
        <div class="reading-title">${b.title}</div>
        <div class="reading-author">${b.author} · <span class="tag">${categoryLabel(b.category)}</span></div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${b.progress}%"></div></div>
          <span class="progress-text">${b.progress > 0 ? b.progress + '%' : '未开始'}</span>
        </div>
      </div>
    </div>
  `).join('');

  /* done list */
  document.getElementById('books-done').innerHTML = books.done.map(b => `
    <div class="done-card">
      <div class="done-cover">${makeCoverImg(b, 44, 60)}</div>
      <div class="done-info">
        <div class="done-title">${b.title}</div>
        <div class="done-meta">
          <span class="done-author">${b.author}</span>
          <span class="tag">${categoryLabel(b.category)}</span>
          ${b.notes ? `<a class="done-notes-link" href="${b.notes}">📝 笔记</a>` : ''}
        </div>
      </div>
      <div class="done-right">
        <div class="done-check">✓</div>
        <div class="done-date">${b.finishedAt}</div>
      </div>
    </div>
  `).join('');

  /* todo grid */
  document.getElementById('books-todo').innerHTML = books.todo.map(b => `
    <div class="todo-card">
      <div class="todo-cover">${makeCoverImg(b, 40, 56)}</div>
      <div>
        <div class="todo-title">${b.title}</div>
        <div class="todo-author">${b.author}</div>
      </div>
    </div>
  `).join('');
</script>

</body>
</html>
